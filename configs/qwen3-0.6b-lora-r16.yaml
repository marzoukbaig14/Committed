# configs/qwen3-0.6b-lora-r16.yaml
# QLoRA fine-tune config for Committed v1. Read by src/committed/train/train.py.

model:
  name: Qwen/Qwen3-0.6B
  load_in_4bit: true          # QLoRA: frozen base in 4-bit NF4 (bitsandbytes, CUDA-only)
  dtype: null                 # auto: bf16 on cluster GPUs, fp16 on T4
  max_seq_length: 2432        # covers measured real-prompt full max (2339) with headroom; zero truncation

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  use_rslora: true
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  dataset: marzoukbaig14/committed-train
  train_split: train
  eval_split: validation
  completion_only: true

optim:
  learning_rate: 2.0e-4
  lr_scheduler_type: linear
  warmup_ratio: 0.03
  optimizer: adamw_8bit
  weight_decay: 0.01
  max_grad_norm: 1.0

schedule:
  num_train_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  seed: 3407

io:
  output_dir: outputs/qwen3-1.7b-lora-r16
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 500
  save_steps: 500
  push_to_hub: true
  hub_model_id: marzoukbaig14/committed-qwen3-0.6b-lora
  report_to: wandb
  run_name: qwen3-0.6b-lora-r16
  packing: false